<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Waze HUD Navigator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        #app-wrapper { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        #map { height: 60vh; width: 100%; }
        
        #controls { height: 40vh; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        input { 
            padding: 30px; 
            font-size: 28px; 
            border-radius: 15px; 
            border: 2px solid #555; 
            background: #222;
            color: white;
            width: 100%;
        }
        
        button, #btn-link-container { 
            padding: 30px; 
            font-size: 32px; 
            border-radius: 15px; 
            border: none; 
            background: #00d4ff; 
            font-weight: bold; 
            text-align: center;
            cursor: pointer;
        }
        
        a { color: #000; text-decoration: none; display: block; width: 100%; height: 100%; }
    </style>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <div id="app-wrapper">
        <div id="map"></div>
        <div id="controls">
            <input type="text" id="addressInput" placeholder="Saisir la destination..." />
            <button id="actionBtn" onclick="processAction()">CHERCHER</button>
        </div>
    </div>

    <script>
        const map = L.map('map').setView([48.8566, 2.3522], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = null;

        function processAction() {
            const btn = document.getElementById('actionBtn');
            const address = document.getElementById('addressInput').value;

            if (!address) return alert("Veuillez entrer une adresse");

            btn.textContent = "CALCUL...";

            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`)
            .then(res => res.json())
            .then(data => {
                if (data.length > 0) {
                    const lat = data[0].lat;
                    const lon = data[0].lon;
                    
                    map.setView([lat, lon], 15);
                    if (marker) map.removeLayer(marker);
                    marker = L.marker([lat, lon]).addTo(map);
                    
                    // Transformation du bouton en lien cliquable pour Waze
                    btn.style.background = "#00ff99";
                    btn.innerHTML = `<a href="waze://?ll=${lat},${lon}&navigate=yes">LANCER WAZE</a>`;
                } else {
                    alert("Adresse non trouvée");
                    btn.textContent = "CHERCHER";
                }
            });
        }
    </script>
</body>
</html>
