<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HUD Waze</title>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; height: 100vh; justify-content: center; align-items: center; }
        /* Zone de saisie énorme pour être sûr de pouvoir cliquer dessus avec les lunettes */
        input { 
            width: 90%; padding: 60px; font-size: 50px; 
            border: 10px solid #00d4ff; background: #222; color: #fff; 
            border-radius: 30px; text-align: center;
        }
        button { 
            margin-top: 40px; width: 90%; padding: 60px; font-size: 50px; 
            background: #00d4ff; border: none; border-radius: 30px; font-weight: bold;
        }
    </style>
</head>
<body>

    <input type="text" id="addressInput" speech x-webkit-speech placeholder="CLIQUEZ ICI POUR PARLER" />
    
    <button id="searchBtn" onclick="chercher()">CHERCHER</button>

    <script>
        function chercher() {
            const addr = document.getElementById('addressInput').value;
            if (!addr) return;
            // Redirection directe vers Waze
            window.location.href = `https://waze.com/ul?q=${encodeURIComponent(addr)}&navigate=yes`;
        }
    </script>
</body>
</html>
