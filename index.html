<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waze Ray-Ban 2 - HUD Neural Edition</title>
    
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl-js.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl-js.js"></script>

    <style>
        /* Design HUD Haute Visibilité optimisé pour Meta Display (Fond noir = pixels éteints) */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            font-family: 'Consolas', 'Courier New', monospace;
            overflow: hidden;
            color: #00ffcc; /* Cyan/Vert fluo pour l'extérieur */
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            opacity: 0.80; /* Fusionne la carte avec l'environnement réel */
        }

        /* Overlay HUD */
        .hud-container {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 20px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .search-box {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ffcc;
            border-radius: 6px;
            padding: 12px;
            pointer-events: auto;
        }

        .search-box input {
            width: 100%;
            background: transparent;
            border: none;
            color: #00ffcc;
            font-size: 16px;
            font-family: inherit;
            outline: none;
        }

        /* Indicateur d'enregistrement Micro */
        .mic-indicator {
            align-self: flex-end;
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ff3333;
            color: #ff3333;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
            display: none;
            animation: pulse 1.2s infinite;
        }

        /* Outil de debug du Neural Band intégré au HUD */
        .debug-panel {
            background: rgba(0, 0, 0, 0.9);
            border: 1px dashed #ffaa00;
            color: #ffaa00;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            margin-top: 10px;
            align-self: flex-start;
        }

        /* Barre de statut inférieure */
        .hud-status {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #00ffcc;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 12px;
            text-align: center;
            align-self: center;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="hud-container">
        <div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="[ En attente du geste Neural ]" readonly>
            </div>
            
            <div id="mic-indicator" class="mic-indicator">• MICRO ACTIF / PARLEZ</div>
            
            <div id="debug-panel" class="debug-panel">DERNIER GESTE DÉTECTÉ : AUCUN (Faites un geste pour tester)</div>
        </div>

        <div class="hud-status" id="hud-status">NEURAL SYSTEM : READY</div>
    </div>

    <script>
        // CONFIGURATION : Mettez votre clé Mapbox ici
        mapboxgl.accessToken = 'VOTRE_TOKEN_MAPBOX_ICI';

        // Variable clé pour le déclenchement (Modifiez 'Enter' si votre bracelet envoie autre chose)
        const DECLENCHEUR_NEURAL = 'Enter'; 

        // Initialisation de la carte (Style Dark pour économie d'énergie et lisibilité Meta Display)
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11', 
            center: [2.3522, 48.8566], // Paris par défaut
            zoom: 14,
            pitch: 50,
            bearing: 0
        });

        // Marqueur de position de navigation
        const navMarker = new mapboxgl.Marker({ color: '#00ffcc' })
            .setLngLat([2.3522, 48.8566])
            .addTo(map);

        // Éléments du DOM
        const searchInput = document.getElementById('search-input');
        const micIndicator = document.getElementById('mic-indicator');
        const debugPanel = document.getElementById('debug-panel');
        const hudStatus = document.getElementById('hud-status');
        let isListening = false;

        // Configuration du moteur de dictée vocale (Web Speech API)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                micIndicator.style.display = 'block';
                hudStatus.innerText = "ÉCOUTE EN COURS...";
                hudStatus.style.color = "#ff3333";
                hudStatus.style.borderColor = "#ff3333";
            };

            recognition.onresult = (event) => {
                const texteDicte = event.results[0][0].transcript;
                searchInput.value = texteDicte;
                hudStatus.innerText = "RECHERCHE : " + texteDicte.toUpperCase();
                lancerRechercheDestination(texteDicte);
            };

            recognition.onerror = (event) => {
                hudStatus.innerText = "ERREUR DICTÉE : " + event.error.toUpperCase();
                resetHUDDelayed();
            };

            recognition.onend = () => {
                isListening = false;
                micIndicator.style.display = 'none';
                resetHUDDelayed();
            };
        } else {
            hudStatus.innerText = "ERREUR : NAVIGATEUR NON COMPATIBLE MICRO";
        }

        // --- INTERCEPTION DU NEURAL BAND + DÉTECTEUR DE TOUCHES ---
        window.addEventListener('keydown', (event) => {
            // Affiche immédiatement la touche reçue sur l'écran pour que vous puissiez voir le code du geste
            debugPanel.innerText = `DERNIER GESTE DÉTECTÉ : Code = "${event.key}"`;
            debugPanel.style.color = "#00ffcc";
            debugPanel.style.borderColor = "#00ffcc";

            // Si la touche correspond à votre déclencheur configuré
            if (event.key === DECLENCHEUR_NEURAL) {
                event.preventDefault(); // Bloque l'action Android par défaut
                
                if (!isListening && recognition) {
                    recognition.start();
                }
            }

            // Réinitialise la couleur du panneau de debug après 2 secondes
            setTimeout(() => {
                debugPanel.style.color = "#ffaa00";
                debugPanel.style.borderColor = "#ffaa00";
            }, 2000);
        });

        // Liaison avec l'API Geocoding de Mapbox pour déplacer la carte
        function lancerRechercheDestination(query) {
            const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?access_token=${mapboxgl.accessToken}&country=FR&limit=1`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.features && data.features.length > 0) {
                        const coords = data.features[0].geometry.coordinates;
                        const nomLieu = data.features[0].place_name;

                        // Animation fluide vers la destination
                        map.flyTo({ center: coords, zoom: 15, essential: true });
                        navMarker.setLngLat(coords);
                        hudStatus.innerText = "NAV VERS : " + nomLieu.toUpperCase();
                    } else {
                        hudStatus.innerText = "DESTINATION INTROUVABLE";
                    }
                })
                .catch(err => {
                    hudStatus.innerText = "ERREUR RÉSEAU MAPBOX";
                });
        }

        function resetHUDDelayed() {
            setTimeout(() => {
                if (!isListening) {
                    hudStatus.innerText = "NEURAL SYSTEM : READY";
                    hudStatus.style.color = "#00ffcc";
                    hudStatus.style.borderColor = "#00ffcc";
                }
            }, 3500);
        }
    </script>
</body>
</html>
