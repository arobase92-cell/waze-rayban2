<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waze Ray-Ban 2 - HUD Edition</title>
    
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl-js.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl-js.js"></script>

    <style>
        /* Style général optimisé pour un affichage tête haute (HUD) Meta Display */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* Fond noir pour éteindre les pixels inutiles sur les lunettes */
            font-family: 'Consolas', 'Courier New', monospace;
            overflow: hidden;
            color: #00ffcc; /* Vert fluo / Cyan pour un contraste maximal en extérieur */
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            opacity: 0.85; /* Légère transparence pour fusionner avec la réalité */
        }

        /* Conteneurs de l'interface utilisateur HUD */
        .hud-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            z-index: 10;
            pointer-events: none; /* Laisse passer les interactions vers la carte si nécessaire */
        }

        .search-box {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #00ffcc;
            border-radius: 6px;
            padding: 10px 15px;
            display: block;
            pointer-events: auto;
        }

        .search-box input {
            width: 100%;
            background: transparent;
            border: none;
            color: #00ffcc;
            font-size: 16px;
            font-family: inherit;
            outline: none;
        }

        .search-box input::placeholder {
            color: rgba(0, 255, 204, 0.5);
        }

        /* Indicateur d'état du Micro (Dictée Vocale) */
        .mic-indicator {
            position: absolute;
            top: 80px;
            right: 15px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ff3333;
            color: #ff3333;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
            display: none; /* Caché par défaut */
            animation: pulse 1.5s infinite;
            z-index: 11;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* Instructions système en bas de l'écran */
        .hud-status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00ffcc;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            text-align: center;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="hud-overlay">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="[ Geste Neural Band pour dicter ]" readonly>
        </div>
    </div>

    <div id="mic-indicator" class="mic-indicator">• ENREGISTREMENT VOCAL...</div>

    <div class="hud-status" id="hud-status">NEURAL BAND : PRÊT | EN ATTENTE DE GESTE</div>

    <script>
        // TO-DO: Remplacer par votre propre token Mapbox actif
        mapboxgl.accessToken = 'VOTRE_TOKEN_MAPBOX_ICI';

        // Initialisation de la carte optimisée pour le HUD (Style sombre / Dark)
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11', 
            center: [2.3522, 48.8566], // Centré par défaut sur Paris
            zoom: 13,
            pitch: 45, // Vue en perspective type navigation de conduite
            bearing: 0
        });

        // Ajouter un marqueur de position globale
        const navigationMarker = new mapboxgl.Marker({ color: '#00ffcc' })
            .setLngLat([2.3522, 48.8566])
            .addTo(map);

        // Variables pour la reconnaissance vocale
        const searchInput = document.getElementById('search-input');
        const micIndicator = document.getElementById('mic-indicator');
        const hudStatus = document.getElementById('hud-status');
        let isListening = false;

        // Configuration de l'API Web Speech
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                micIndicator.style.display = 'block';
                hudStatus.innerText = "DICTÉE EN COURS... PARLEZ NOW";
                hudStatus.style.borderColor = "#ff3333";
                hudStatus.style.color = "#ff3333";
                searchInput.placeholder = "Écoute en cours...";
            };

            recognition.onresult = (event) => {
                const resultText = event.results[0][0].transcript;
                searchInput.value = resultText;
                hudStatus.innerText = "RECHERCHE : " + resultText.toUpperCase();
                
                // Lancer la recherche d'itinéraire / géocodage sur Mapbox
                executerGeocodage(resultText);
            };

            recognition.onerror = (event) => {
                console.error("Erreur Speech:", event.error);
                hudStatus.innerText = "ERREUR DE DICTÉE : " + event.error.toUpperCase();
                resetHUDStatusDelayed();
            };

            recognition.onend = () => {
                isListening = false;
                micIndicator.style.display = 'none';
                searchInput.placeholder = "[ Geste Neural Band pour dicter ]";
                resetHUDStatusDelayed();
            };
        } else {
            hudStatus.innerText = "ERREUR : WEB SPEECH API NON SUPPORTÉE";
        }

        // --- GESTION DU NEURAL BAND ---
        // Le bracelet traduit vos mouvements musculaires/nerveux en événements claviers (ex: Touche Entrée / Raccourci)
        window.addEventListener('keydown', (event) => {
            // AJUSTEMENT : Remplacez 'Enter' par la touche émise par votre configuration Neural Band
            // Si le bracelet envoie un signal spécifique pour "Actionner le micro"
            if (event.key === 'Enter') { 
                event.preventDefault(); // Empêche le comportement par défaut d'Android
                
                if (!isListening && recognition) {
                    recognition.start();
                }
            }
        });

        // Fonction pour géocoder l'adresse dictée via l'API Mapbox
        function executerGeocodage(query) {
            const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?access_token=${mapboxgl.accessToken}&country=FR&limit=1`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.features && data.features.length > 0) {
                        const coordinates = data.features[0].geometry.coordinates;
                        const placeName = data.features[0].place_name;

                        // Centrer la carte sur la destination trouvée
                        map.flyTo({
                            center: coordinates,
                            zoom: 15,
                            essential: true
                        });

                        // Déplacer le marqueur
                        navigationMarker.setLngLat(coordinates);
                        hudStatus.innerText = "DESTINATION : " + placeName.toUpperCase();
                    } else {
                        hudStatus.innerText = "DESTINATION INTROUVABLE";
                    }
                })
                .catch(err => {
                    console.error("Erreur Geocoding:", err);
                    hudStatus.innerText = "ERREUR RÉSEAU MAPBOX";
                });
        }

        function resetHUDStatusDelayed() {
            setTimeout(() => {
                if (!isListening) {
                    hudStatus.innerText = "NEURAL BAND : PRÊT | EN ATTENTE DE GESTE";
                    hudStatus.style.borderColor = "#00ffcc";
                    hudStatus.style.color = "#00ffcc";
                }
            }, 4000);
        }
    </script>
</body>
</html>
