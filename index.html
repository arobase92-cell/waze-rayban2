<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waze HUD Dynamique — Mode Voiture</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        body {
            background-color: #000;
            color: #33ff33; /* Vert HUD haute visibilité */
            font-family: Arial, sans-serif;
            width: 600px;
            height: 600px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
        }
        .top-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .speedometer { 
            font-size: 5rem; 
            font-weight: 900; 
        }
        .speed-unit { 
            font-size: 1.5rem; 
            vertical-align: super; 
        }
        .voice-status {
            background-color: #222;
            color: #33ccff;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 1.2rem;
            border: 1px solid #33ccff;
            cursor: pointer;
        }
        .voice-status.listening {
            background-color: #ff3333;
            color: #000;
            animation: pulse 1s infinite;
        }
        .navigation-main { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .turn-arrow { 
            font-size: 8rem; 
        }
        .bottom-bar { 
            text-align: center; 
        }
        .next-step { 
            font-size: 2.2rem; 
            font-weight: bold; 
            color: #ffffff; 
            margin-bottom: 5px; 
        }
        .street-name { 
            font-size: 1.6rem; 
            color: #33ccff; 
            text-transform: uppercase; 
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="speedometer"><span id="speed">0</span><span class="speed-unit">km/h</span></div>
        <div id="voiceBtn" class="voice-status">🎤 Prêt (cliquez)</div>
    </div>

    <div class="navigation-main">
        <div id="arrow" class="turn-arrow">⬆️</div>
    </div>

    <div class="bottom-bar">
        <div id="distance" class="next-step">En attente de destination</div>
        <div id="destination" class="street-name">Dictez une adresse...</div>
    </div>
