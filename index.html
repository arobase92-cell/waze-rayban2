<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HUD Waze</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #app { padding: 40px; display: flex; flex-direction: column; gap: 40px; }
        
        button { 
            padding: 50px; font-size: 40px; border-radius: 20px; 
            border: none; font-weight: bold; cursor: pointer;
        }
        #voiceBtn { background: #ffcc00; color: #000; }
        #searchBtn { background: #00d4ff; color: #000; }
        textarea { width: 100%; padding: 30px; font-size: 35px; background: #222; color: #fff; border: 4px solid #00d4ff; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="app">
        <textarea id="addressInput" placeholder="Attente de dictée..."></textarea>
        <button id="voiceBtn" onclick="startVoice()">🎤 DICTER DESTINATION</button>
        <button id="searchBtn" onclick="chercher()">CHERCHER</button>
    </div>

    <script>
        function startVoice() {
            // Vérification du support
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Votre navigateur ne supporte pas la dictée vocale.");
                return;
            }
            const recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';
            recognition.start();
            recognition.onresult = (event) => {
                document.getElementById('addressInput').value = event.results[0][0].transcript;
            };
            recognition.onerror = (e) => alert("Erreur micro : " + e.error);
        }

        function chercher() {
            const addr = document.getElementById('addressInput').value;
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}`)
            .then(res => res.json())
            .then(data => {
                if (data.length > 0) {
                    const url = `https://waze.com/ul?ll=${data[0].lat},${data[0].lon}&navigate=yes`;
                    document.getElementById('searchBtn').innerHTML = `<a href="${url}" style="text-decoration:none; color:#000;">LANCER WAZE</a>`;
                }
            });
        }
    </script>
</body>
</html>
