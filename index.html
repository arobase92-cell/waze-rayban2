<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Waze HUD Simple</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        #map { height: 40vh; width: 100%; }
        #input-zone { height: 60vh; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        /* Input obligatoire : on ne peut pas forcer le focus, il faut cliquer dessus */
        #addressInput { 
            width: 100%; padding: 40px; font-size: 32px; 
            border: 6px solid #00d4ff; background: #222; color: #fff; border-radius: 15px;
        }
        button { 
            width: 100%; padding: 40px; font-size: 32px; background: #00d4ff; 
            border: none; border-radius: 15px; font-weight: bold;
        }
    </style>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <div id="map"></div>
    <div id="input-zone">
        <input type="text" id="addressInput" placeholder="CLIQUEZ ICI POUR SAISIR..." />
        <button id="searchBtn" onclick="chercher()">CHERCHER</button>
    </div>

    <script>
        const map = L.map('map').setView([48.8566, 2.3522], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function chercher() {
            const addr = document.getElementById('addressInput').value;
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}`)
            .then(res => res.json())
            .then(data => {
                if (data.length > 0) {
                    const btn = document.getElementById('searchBtn');
                    const url = `https://waze.com/ul?ll=${data[0].lat},${data[0].lon}&navigate=yes`;
                    btn.style.background = "#00ff99";
                    btn.innerHTML = `<a href="${url}" style="text-decoration:none; color:#000;">LANCER WAZE</a>`;
                } else {
                    alert("Adresse non trouvée");
                }
            });
        }
    </script>
</body>
</html>
