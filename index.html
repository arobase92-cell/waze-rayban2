<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Waze HUD Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        /* Zone Carte : Clic partout pour activer la saisie */
        #map { height: 50vh; width: 100%; cursor: pointer; }
        
        /* Zone Saisie : Très haute pour être facile à viser */
        #controls { height: 50vh; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        input { 
            padding: 40px; font-size: 32px; border-radius: 20px; 
            border: 6px solid #00d4ff; background: #222; color: #fff; 
            width: 100%; box-sizing: border-box;
        }
        
        button { 
            padding: 40px; font-size: 32px; border-radius: 20px; 
            border: none; background: #00d4ff; color: #000; font-weight: bold;
        }
    </style>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body onclick="document.getElementById('addressInput').focus()">

    <div id="map"></div>
    <div id="controls">
        <input type="text" id="addressInput" placeholder="DESTINATION..." />
        <button id="actionBtn" onclick="processAction()">CHERCHER</button>
    </div>

    <script>
        const map = L.map('map').setView([48.8566, 2.3522], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        function processAction() {
            const address = document.getElementById('addressInput').value;
            if (!address) return;
            
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`)
            .then(res => res.json())
            .then(data => {
                if (data.length > 0) {
                    const lat = data[0].lat;
                    const lon = data[0].lon;
                    map.setView([lat, lon], 15);
                    const btn = document.getElementById('actionBtn');
                    btn.style.background = "#00ff99";
                    btn.innerHTML = `<a href="https://waze.com/ul?ll=${lat},${lon}&navigate=yes" style="text-decoration:none; color:#000; display:block;">LANCER WAZE</a>`;
                }
            });
        }
    </script>
</body>
</html>
