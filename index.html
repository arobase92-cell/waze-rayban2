<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>HUD Navigation</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
    touch-action: manipulation;
}

/* HUD container */
#hud {
    display: flex;
    flex-direction: column;
    height: 100%;
}

/* Top bar */
#topbar {
    height: 70px;
    display: flex;
    align-items: center;
    padding: 10px;
    background: #111;
    box-sizing: border-box;
}

/* Input */
#destination {
    flex: 1;
    height: 45px;
    font-size: 16px; /* important anti-zoom mobile */
    border: none;
    border-radius: 10px;
    padding: 10px;
    outline: none;
}

/* Button */
#goBtn {
    margin-left: 10px;
    height: 45px;
    padding: 0 15px;
    border: none;
    border-radius: 10px;
    background: #00c853;
    color: black;
    font-weight: bold;
}

/* Main display */
#screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 14px;
    color: #666;
}
</style>
</head>

<body>

<div id="hud">

    <div id="topbar">
        <input id="destination" placeholder="Destination..." />
        <button id="goBtn">GO</button>
    </div>

    <div id="screen">
        En attente de navigation...
    </div>

</div>

<script>
const input = document.getElementById("destination");
const btn = document.getElementById("goBtn");

function launchNavigation() {
    const dest = input.value.trim();
    if (!dest) return;

    // Deep link app Waze
    const appLink = `waze://?q=${encodeURIComponent(dest)}&navigate=yes`;

    // Web fallback (toujours fiable)
    const webLink = `https://waze.com/ul?q=${encodeURIComponent(dest)}&navigate=yes`;

    // tentative ouverture app
    window.location.href = appLink;

    // fallback automatique si bloqué (WebView / lunettes / navigateur limité)
    setTimeout(() => {
        window.location.href = webLink;
    }, 1200);

    document.getElementById("screen").innerText = "Navigation vers : " + dest;
}

// Click bouton
btn.addEventListener("click", launchNavigation);

// Enter clavier
input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        e.preventDefault();
        launchNavigation();
    }
});
</script>

</body>
</html>
