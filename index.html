<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waze HUD — Ray-Ban Display & Neural Band</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        body {
            background-color: #000;
            color: #33ff33; /* Vert HUD haute visibilité */
            font-family: Arial, sans-serif;
            width: 600px;
            height: 600px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
        }
        
        /* Barre Supérieure (Vitesse et Zone Alerte) */
        .top-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .speedometer { 
            font-size: 5rem; 
            font-weight: 900; 
        }
        .speed-unit { 
            font-size: 1.5rem; 
            vertical-align: super; 
        }
        
        /* Alerte Radar Flashy */
        .radar-alert {
            background-color: #ff3333;
            color: #000;
            font-weight: bold;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 1.6rem;
            display: none; 
            animation: blink 0.8s infinite;
            box-shadow: 0 0 20px #ff3333;
        }

        /* Indicateur Micro / Statut */
        .voice-status {
            background-color: #222;
            color: #33ccff;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 1.2rem;
            border: 1px solid #33ccff;
            cursor: pointer;
        }
        .voice-status.listening {
            background-color: #ff3333;
            color: #000;
            animation: blink 1s infinite;
        }

        /* Centre (Flèche de direction principale) */
        .navigation-main { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .turn-arrow { 
            font-size: 8rem; 
            text-shadow: 0 0 20px #33ff33; 
        }

        /* Barre Inférieure (Instructions textuelles) */
        .bottom-bar { 
            text-align: center; 
        }
        .next-step { 
            font-size: 2.2rem; 
            font-weight: bold; 
            color: #ffffff; 
            margin-bottom: 5px; 
        }
        .street-name { 
            font-size: 1.6rem; 
            color: #33ccff; 
            text-transform: uppercase; 
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.2; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="speedometer"><span id="speed">0</span><span class="speed-unit">km/h</span></div>
        <div id="radarZone" class="radar-alert">⚠️ RADAR <span id="radarDist"></span></div>
        <div id="voiceBtn" class="voice-status">🎤 Destination</div>
    </div>

    <div class="navigation-main">
        <div id="arrow" class="turn-arrow">⬆️</div>
    </div>

    <div class="bottom-bar">
        <div id="distance" class="next-step">En attente...</div>
        <div id="destination" class="street-name">Cliquez sur le micro pour tester</div>
    </div>

    <script>
        // Remplacez par votre clé publique générée sur Mapbox
        const MAPBOX_TOKEN = 'VOTRE_CLE_API_MAPBOX'; 

        const voiceBtn = document.getElementById('voiceBtn');
        const destinationText = document.getElementById('destination');
        const distanceText = document.getElementById('distance');
        const arrowText = document.getElementById('arrow');
        const radarZone = document.getElementById('radarZone');
        const radarDist = document.getElementById('radarDist');
        
        let userLog = 0; 
        let userLat = 0;
        let listeRadars = [];

        // Audio Context intégré (Génère un bip sonore pur sans dépendre d'un fichier audio .mp3 externe)
        let audioCtx = null;
        function biper() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine'; 
            osc.frequency.value = 880; 
            osc.connect(gain); 
            gain.connect(audioCtx.destination);
            osc.start(); 
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            osc.stop(audioCtx.currentTime + 0.4);
        }

        // 1. GÉOLOCALISATION GPS EN TEMPS RÉEL
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((position) => {
                userLog = position.coords.longitude;
                userLat = position.coords.latitude;
                
                // Vitesse calculée convertie en km/h
                const speedKmh = position.coords.speed ? Math.round(position.coords.speed * 3.6) : 0;
                document.getElementById('speed').textContent = speedKmh;

                // Charge les radars d'OpenStreetMap dès qu'on a le premier point GPS
                if(listeRadars.length === 0 && userLat !== 0) chargerRadarsLocaux(userLat, userLog);

                // Vérifie la distance avec les radars à chaque déplacement
                if(listeRadars.length > 0) verifierProximiteRadars();
            }, (err) => {
                console.log("GPS indisponible ou en attente. Mode simulation activé par défaut.");
            }, { enableHighAccuracy: true });
        }

        // 2. TÉLÉCHARGEMENT DES RADARS VIA OPENSTREETMAP (Overpass API)
        async function chargerRadarsLocaux(lat, lon) {
            const query = `[out:json];node["highway"="speed_camera"](around:15000,${lat},${lon});out;`;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                listeRadars = data.elements;
                console.log(`${listeRadars.length} radars synchronisés dans un rayon de 15km.`);
            } catch (e) { 
                console.error("Erreur d'accès à la base de radars OpenStreetMap :", e); 
            }
        }

        // 3. SURVEILLANCE ET FORMULE DE HAVERSINE (Distance Terre plate/ronde)
        function calculerDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Rayon de la Terre en mètres
            const phi1 = lat1 * Math.PI/180;
            const phi2 = lat2 * Math.PI/180;
            const deltaPhi = (lat2-lat1) * Math.PI/180;
            const deltaLambda = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) +
                      Math.cos(phi1) * Math.cos(phi2) *
                      Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function verifierProximiteRadars() {
            let distanceMin = 999999;

            listeRadars.forEach(radar => {
                const dist = calculerDistance(userLat, userLog, radar.lat, radar.lon);
                if (dist < distanceMin) distanceMin = dist;
            });

            // Déclenchement de l'alerte à moins de 500m
            if (distanceMin <= 500) {
                if (radarZone.style.display !== 'block') biper(); 
                radarZone.style.display = 'block';
                radarDist.textContent = `${Math.round(distanceMin)}m`;
            } else {
                radarZone.style.display = 'none';
            }
        }

        // 4. RECONNAISSANCE VOCALE (Web Speech API)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';

            voiceBtn.addEventListener('click', () => {
                if (audioCtx) audioCtx.resume(); // Débloque l'audio sur interaction chrome
                recognition.start();
            });
            
            recognition.onstart = () => { 
                voiceBtn.textContent = "🛑 Écoute..."; 
                voiceBtn.classList.add('listening'); 
            };
            
            recognition.onresult = async (event) => {
                const adresseDictee = event.results[0][0].transcript;
                destinationText.textContent = adresseDictee;
                distanceText.textContent = "Calcul de l'itinéraire...";
                recupererItineraire(adresseDictee);
            };
            
            recognition.onend = () => { 
                voiceBtn.textContent = "🎤 Destination"; 
                voiceBtn.classList.remove('listening'); 
            };
        } else {
            voiceBtn.textContent = "Micro Non Supporté";
        }

        // 5. CALCUL DU TRAJET REEL (OU SIMULATION SECURE)
        async function recupererItineraire(adresse) {
            // BACKUP AUTOMATIQUE : Si pas de clé ou pas de signal GPS, on force un test visuel propre
            if (MAPBOX_TOKEN === 'VOTRE_CLE_API_MAPBOX' || userLat === 0) {
                console.log("Mode démo : Simulation d'itinéraire en cours.");
                setTimeout(() => {
                    document.getElementById('speed').textContent = "78"; // Simule la vitesse
                    radarZone.style.display = 'block'; // Simule un radar proche
                    radarDist.textContent = "320m";
                    biper();
                    
                    const etapeDemo = {
                        distance: 400,
                        maneuver: {
                            instruction: "Prendre la bretelle à droite sur l'A86",
                            type: "turn",
                            modifier: "right"
                        }
                    };
                    mettreAJourHUD(etapeDemo);
                }, 1500);
                return;
            }

            // MODE NAVIGATION REEL (Appels API Mapbox)
            try {
                // Étape A : Géocodage de la destination
                const geocodeUrl = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(adresse)}.json?access_token=${MAPBOX_TOKEN}&country=FR&limit=1`;
                const geoResponse = await fetch(geocodeUrl); 
                const geoData = await geoResponse.json();
                if (!geoData.features || geoData.features.length === 0) {
                    distanceText.textContent = "Destination introuvable";
                    return;
                }
                
                const [destLog, destLat] = geoData.features[0].center;

                // Étape B : Calcul de l'itinéraire de conduite
                const directionsUrl = `https://api.mapbox.com/directions/v5/mapbox/driving/${userLog},${userLat};${destLog},${destLat}?steps=true&language=fr&access_token=${MAPBOX_TOKEN}`;
                const dirResponse = await fetch(directionsUrl); 
                const dirData = await dirResponse.json();

                if (dirData.routes && dirData.routes.length > 0) {
                    // Injecte la première instruction active dans l'interface
                    mettreAJourHUD(dirData.routes[0].legs[0].steps[0]);
                } else {
                    distanceText.textContent = "Aucune route trouvée";
                }
            } catch (error) { 
                console.error("Erreur serveur API :", error); 
                distanceText.textContent = "Erreur de connexion";
            }
        }

        // 6. ADAPTATION DYNAMIQUE DE L'INTERFACE VISUELLE
        function mettreAJourHUD(step) {
            const distance = step.distance;
            distanceText.textContent = distance > 1000 ? `Dans ${(distance/1000).toFixed(1)} km` : `Dans ${Math.round(distance)} m`;
            destinationText.textContent = step.maneuver.instruction;
            
            const modifier = step.maneuver.modifier;
            const type = step.maneuver.type;

            if ((type.includes("turn") || type.includes("ramp") || type.includes("merge")) && modifier) {
                if (modifier.includes("right")) arrowText.textContent = "➔";
                else if (modifier.includes("left")) arrowText.textContent = "⬅︎";
                else arrowText.textContent = "⬆️";
            } else if (type.includes("roundabout")) {
                arrowText.textContent = "🔄";
            } else { 
                arrowText.textContent = "⬆️"; 
            }
        }
    </script>
</body>
</html>
