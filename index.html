<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waze HUD — Mode Voiture</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000;
            color: #33ff33; /* Vert HUD haute visibilité */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            width: 600px;
            height: 600px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
        }

        /* Barre supérieure : Vitesse et Alertes */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .speedometer {
            font-size: 5rem;
            font-weight: 900;
            line-height: 1;
        }
        .speed-unit {
            font-size: 1.5rem;
            vertical-align: super;
            margin-left: 5px;
        }
        .danger-alert {
            background-color: #ff3333;
            color: #000;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1.5rem;
            animation: blink 1s infinite;
        }

        /* Centre : Flèche de direction principale */
        .navigation-main {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }
        .turn-arrow {
            font-size: 8rem;
            line-height: 1;
        }

        /* Barre inférieure : Info rue et distance */
        .bottom-bar {
            text-align: center;
        }
        .next-step {
            font-size: 2.2rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 5px;
        }
        .street-name {
            font-size: 1.6rem;
            color: #33ccff; /* Bleu Waze pour les axes */
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.2; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="speedometer">85<span class="speed-unit">km/h</span></div>
        <div class="danger-alert">⚠️ RADAR</div>
    </div>

    <div class="navigation-main">
        <div class="turn-arrow">⬈</div>
    </div>

    <div class="bottom-bar">
        <div class="next-step">Dans 400m</div>
        <div class="street-name">A86 — direction Paris</div>
    </div>

</body>
</html>
