<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Navigation Simple</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: black;
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: white;
    touch-action: manipulation;
}

#container {
    display: flex;
    flex-direction: column;
    height: 100%;
}

#top {
    display: flex;
    padding: 10px;
    background: #111;
    box-sizing: border-box;
}

#input {
    flex: 1;
    height: 45px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    padding: 10px;
    outline: none;
}

#btn {
    margin-left: 10px;
    padding: 0 15px;
    border-radius: 10px;
    border: none;
    background: #00e676;
    font-weight: bold;
}

#screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 14px;
    color: #666;
}
</style>
</head>

<body>

<div id="container">

    <div id="top">
        <input id="input" placeholder="Destination..." />
        <button id="btn">GO</button>
    </div>

    <div id="screen">
        Tape une destination puis GO
    </div>

</div>

<script>
const input = document.getElementById("input");
const btn = document.getElementById("btn");
const screen = document.getElementById("screen");

function navigate() {
    const dest = input.value.trim();
    if (!dest) return;

    // 🚨 IMPORTANT : seul format fiable partout
    const url = "https://www.google.com/maps/dir/?api=1&destination=" 
                + encodeURIComponent(dest);

    screen.innerText = "Navigation vers : " + dest;

    // ouverture universelle (aucun store, aucun Waze)
    window.location.href = url;
}

btn.addEventListener("click", navigate);

input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        e.preventDefault();
        navigate();
    }
});
</script>

</body>
</html>
