<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUD GPS Moto - Bluetooth Direct & Radars</title>
    
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl-js.js"></script>

    <style>
        /* FOND NOIR ABSOLU = TRANSPARENCE SUR LES VERRES META DISPLAY */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; 
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: #00ffcc; /* Cyan/Vert fluo haute visibilité */
            text-align: center;
        }

        .hud-display {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 20px;
        }

        /* Bouton HUD pour appairer le Bluetooth au démarrage */
        .bt-connect-btn {
            background: #ffaa00;
            color: #000000;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            pointer-events: auto;
            margin: 15px auto;
            display: block;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.4);
        }

        /* Zone Supérieure : Instructions / Navigation */
        .nav-instruction {
            font-size: 22px;
            font-weight: bold;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px;
            border-bottom: 2px solid #00ffcc;
        }

        /* BANDEAU FLASHEUR ROUGE (Prend le dessus en cas de radar proche) */
        .radar-flash {
            display: none; /* Masqué par défaut */
            background: #ff0000;
            color: #ffffff;
            font-size: 26px;
            font-weight: bold;
            padding: 18px;
            border-radius: 8px;
            margin: 10px 0;
            animation: flashBlink 0.4s infinite alternate;
        }

        /* Zone Centrale : Vitesse réelle */
        .speedometer {
            font-size: 75px;
            font-weight: 900;
            color: #00ffcc;
            margin: 15px 0;
        }
        .speed-unit {
            font-size: 20px;
            display: block;
            font-weight: normal;
        }

        /* Indicateur de micro actif */
        .voice-active {
            display: none;
            color: #ff3333;
            font-size: 22px;
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        /* Bas de l'écran : Statut de la connexion */
        .status-bar {
            font-size: 12px;
            color: #ffaa00;
            font-weight: bold;
        }

        /* Animations */
        @keyframes flashBlink {
            0% { background: #ff0000; box-shadow: 0 0 15px #ff0000; }
            100% { background: #000000; color: #ff0000; box-shadow: 0 0 0px transparent; }
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div id="map" style="display: none;"></div>

    <div class="hud-display">
        <div id="nav-text" class="nav-instruction">
            [ APPAIREZ VOTRE PÉRIPHÉRIQUE ]
            <button id="bt-btn" class="bt-connect-btn" onclick="connecterBluetoothDirect()">CONNECTER BRIOCHE GP / BRACELET</button>
        </div>

        <div>
            <div id="radar-alert" class="radar-flash">⚠️ ZONE DE CONTRÔLE VITESSE ⚠️</div>
            
            <div id="voice-indicator" class="voice-active">● ÉCOUTE EN COURS...</div>
            
            <div class="speedometer" id="speed-display">
                0 <span class="speed-unit">KM/H</span>
            </div>
        </div>

        <div id="status-display" class="status-bar">Bluetooth : Déconnecté</div>
    </div>

    <script>
        // CONFIGURATION
        mapboxgl.accessToken = 'VOTRE_TOKEN_MAPBOX_ICI';
        const RAYON_RADAR_METRES = 400; // Rayon de détection des zones de danger

        // Base de données de coordonnées pour les radars (Modifiables selon vos besoins)
        const baseRadars = [
            { id: 1, lat: 48.8566, lng: 2.3522, name: "Radar Fixe" } // Point test (Paris)
        ];

        // Éléments DOM
        const navText = document.getElementById('nav-text');
        const speedDisplay = document.getElementById('speed-display');
        const radarAlert = document.getElementById('radar-alert');
        const voiceIndicator = document.getElementById('voice-indicator');
        const statusDisplay = document.getElementById('status-display');
        const btBtn = document.getElementById('bt-btn');
        let isListening = false;

        // --- GÉNÉRATEUR AUDIO DU BIP RADAR ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function emettreBipRadar() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(950, audioCtx.currentTime); // Son aigu d'alerte
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15); // Durée 150ms
        }

        // --- APPAIRAGE WEB BLUETOOTH DIRECT (Plus besoin de focus) ---
        async function connecterBluetoothDirect() {
            statusDisplay.innerText = "Recherche du matériel...";
            try {
                // Ouvre la fenêtre d'appairage native d'Android
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['generic_access'] // UUID générique modifiable selon specs de la poignée
                });

                statusDisplay.innerText = "Liaison avec : " + device.name;
                const server = await device.gatt.connect();
                
                // Cache le bouton jaune pour dégager le HUD
                btBtn.style.display = 'none';
                navText.innerText = "[ APPUYEZ SUR LA POIGNÉE POUR DICTER ]";
                statusDisplay.innerText = "Liaison Directe Webapp : OK";

                device.addEventListener('gattserverdisconnected', () => {
                    statusDisplay.innerText = "Bluetooth perdu !";
                    btBtn.style.display = 'block';
                });

                // DÉCLENCHEUR : Intercepte les signaux du périphérique appairé
                // Dès que le périphérique Bluetooth envoie son signal de bouton (advertisement ou valeur de caractéristique)
                device.addEventListener('advertisementreceived', (event) => {
                    declencherDictée();
                });

            } catch (error) {
                console.error(error);
                statusDisplay.innerText = "Échec : " + error.message;
            }
        }

        // Fonction d'activation forcée par le Bluetooth
        function declencherDictée() {
            if (!isListening && recognition) {
                recognition.start();
            }
        }

        // --- RECONNAISSANCE VOCALE (WEB SPEECH) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';

            recognition.onstart = () => {
                isListening = true;
                voiceIndicator.style.display = 'block';
                navText.innerText = "OÙ ALLEZ-VOUS ?";
            };

            recognition.onresult = (event) => {
                const adresse = event.results[0][0].transcript;
                navText.innerText = "VERS : " + adresse.toUpperCase();
                calculerItineraireSimulation(); // Déclenche la boucle de mouvement
            };

            recognition.onend = () => {
                isListening = false;
                voiceIndicator.style.display = 'none';
            };
        }

        // --- TRAITEMENT DU GÉOFENCING (SURVEILLANCE RADARS) ---
        function verifierDistanceRadars(maLng, maLat) {
            let zoneAlerteActive = false;

            baseRadars.forEach(radar => {
                // Formule Haversine pour calculer la distance métrique sur Terre
                const R = 6371000;
                const dLat = (radar.lat - maLat) * Math.PI / 180;
                const dLon = (radar.lng - maLng) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                          Math.cos(maLat * Math.PI / 180) * Math.cos(radar.lat * Math.PI / 180) *
                          Math.sin(dLon / 2) * Math.sin(dLon / 2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                const distanceMètres = R * c;

                if (distanceMètres <= RAYON_RADAR_METRES) {
                    zoneAlerteActive = true;
                    radarAlert.innerText = `⚠️ RADAR : ${Math.round(distanceMètres)} METRES ⚠️`;
                }
            });

            if (zoneAlerteActive) {
                if (radarAlert.style.display !== 'block') {
                    radarAlert.style.display = 'block';
                    emettreBipRadar(); // Émet le son dans le système audio des lunettes
                }
            } else {
                radarAlert.style.display = 'none';
            }
        }

        // --- SIMULATION DE CONDUITE APRÈS RECHERCHE ---
        function calculerItineraireSimulation() {
            let vitesseSimulée = 0;
            setInterval(() => {
                if (vitesseSimulée < 90) vitesseSimulée += 3;
                speedDisplay.innerHTML = `${vitesseSimulée} <span class="speed-unit">KM/H</span>`;
                
                // En conduite réelle, remplacez les paramètres ci-dessous par les données de `navigator.geolocation.watchPosition`
                verifierDistanceRadars(2.3522, 48.8566); 
            }, 250);
        }
    </script>
</body>
</html>
